name: sos_app
description: "App de Gestão de Viaturas de Socorro (Guincho) — offline-first com rastreamento GPS."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # --- Gerência de Estado ---
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # --- Banco de Dados Local ---
  drift: ^2.20.0
  drift_flutter: 0.2.4
  sqlite3_flutter_libs: ^0.5.0

  # --- Injeção de Dependência ---
  get_it: ^8.0.2
  injectable: ^2.4.4

  # --- Rede ---
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # --- Conectividade ---
  connectivity_plus: ^6.0.5

  # --- Localização / GPS ---
  geolocator: ^13.0.2
  flutter_background_service: ^5.0.12
  permission_handler: ^11.3.1

  # --- Geocoding e Mapas ---
  geocoding: ^3.0.0
  flutter_google_places_sdk: ^0.4.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # --- Geração de Código / Utils ---
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.4.2
  intl: ^0.19.0

  # --- Armazenamento Seguro ---
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Geração de Código ---
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # --- Testes ---
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  fake_async: ^1.3.1

  # --- Linting ---
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
